<!DOCTYPE html>
<html>
<head>
  <base target="_top">

  <style>

    body{
      font-family:Arial,sans-serif;
      padding:20px;
      background:#f5f5f5;
    }

    h2{
      margin-top:0;
    }

    textarea{
      width:100%;
      height:350px;
      resize:vertical;
      font-family:Consolas, monospace;
      font-size:13px;
      padding:10px;
      box-sizing:border-box;
    }

    button{

      margin-top:15px;
      padding:10px 25px;
      font-size:15px;
      cursor:pointer;

    }

    #status{

      margin-top:15px;
      color:green;
      font-weight:bold;

    }

  </style>

</head>

<body>

<h2>Import PDGA Results</h2>

<p>
Paste the copied PDGA results below.
</p>

<textarea id="results"></textarea>

<br>

<button onclick="importResults()">
Import
</button>

<div id="status"></div>

<script>

function importResults(){

    const text =
      document.getElementById("results").value;

    google.script.run
      .withSuccessHandler(function(message){

          document.getElementById("status").innerHTML = message;

      })
      .saveImportedResults(text);

}

</script>

</body>
</html>
